name: Weekly Ranking Notify

on:
  workflow_dispatch: {}
  schedule:
    # Daily 05:40 JST. Refreshes and stores the latest ranking data without Discord notification.
    - cron: "40 20 * * *"
    # Monday 07:10 JST. GitHub schedule times are evaluated in UTC.
    - cron: "10 22 * * 0"

permissions:
  contents: write

jobs:
  daily-data-refresh:
    if: github.event.schedule == '40 20 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-cloud.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-cloud.txt

      - name: Refresh latest ranking data
        run: python scripts/weekly_cloud_ranker.py --mode refresh --output weekly_ranking_report.json --top 10 --earnings-window-days 120 --state-file .github/ranking-state.json --update-state --workers 2 --chunk-size 450

      - name: Save refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekly_ranking_report.json .github/ranking-state.json
          git commit -m "Refresh daily ranking data" || echo "No ranking data changes"
          git push || echo "Daily ranking data push skipped"

      - name: Upload ranking report
        uses: actions/upload-artifact@v4
        with:
          name: daily-ranking-report
          path: weekly_ranking_report.json

  weekly-ranking:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 22 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-cloud.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-cloud.txt

      - name: Send saved ranking notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python scripts/weekly_cloud_ranker.py --mode notify --output weekly_ranking_report.json --top 10 --earnings-window-days 120 --state-file .github/ranking-state.json

      - name: Upload ranking report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ranking-report
          path: weekly_ranking_report.json
