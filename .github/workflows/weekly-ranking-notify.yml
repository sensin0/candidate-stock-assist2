name: Weekly Ranking Notify

on:
  workflow_dispatch:
  schedule:
    # Monday 08:23 JST. GitHub schedule times are evaluated in UTC.
    - cron: "23 23 * * 0"

permissions:
  contents: read

jobs:
  update-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-cloud.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-cloud.txt

      - name: Build latest ranking and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/weekly_cloud_ranker.py --output weekly_ranking_report.json --top 10

      - name: Upload ranking report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ranking-report
          path: weekly_ranking_report.json
