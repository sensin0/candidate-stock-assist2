name: Monthly Ticker Universe Update

on:
  workflow_dispatch: {}
  schedule:
    # Around 07:20 JST on the 6th day of each month.
    # JPX says the previous month-end listed issues file is posted after 09:00 on the 3rd business day.
    - cron: "20 22 5 * *"

permissions:
  contents: write

jobs:
  update-ticker-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-cloud.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-cloud.txt

      - name: Update Japan ticker universe
        run: python scripts/update_japan_tickers.py --output japan_tickers.csv --min-count 3000

      - name: Save ticker universe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add japan_tickers.csv
          git commit -m "Update Japan ticker universe" || echo "No ticker universe changes"
          git push || echo "Ticker universe push skipped"
