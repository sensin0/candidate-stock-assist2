name: Publish Ranking Dashboard

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Weekly Ranking Notify"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "weekly_ranking_report.json"
      - ".gitignore"
      - ".github/workflows/pages-dashboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-dashboard
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -R docs/. _site/
          cp weekly_ranking_report.json _site/weekly_ranking_report.json
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
